name: Deploy

# Production deploys happen here, never from a developer's machine: every push to
# master builds, tests, applies the D1 schema, and deploys the Worker to
# Cloudflare. Pull requests get a dry-run build so problems surface before merge.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build SPA
        run: npm run build:web
      - name: Dry-run Worker bundle
        run: npx wrangler deploy --dry-run

  deploy:
    needs: build-test
    # Activates once Cloudflare is set up: set the repo variable DEPLOY_ENABLED=true
    # (Settings → Secrets and variables → Actions → Variables). Until then, pushes
    # build + test green and the deploy is skipped — no red X before infra exists.
    if: github.ref == 'refs/heads/master' && github.event_name == 'push' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build SPA
        run: npm run build:web

      # Apply the (idempotent) D1 schema before the Worker that depends on it.
      - name: Apply D1 schema
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute reposentry-db --remote --file=./src/db/schema.sql

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
