name: Deploy

# Production deploys happen here, never from a developer's machine: every push to
# master builds, tests, applies the D1 schema, sets Worker secrets, and deploys to
# Cloudflare. Pull requests get a dry-run build so problems surface before merge.
# `workflow_dispatch` allows a manual re-deploy from the Actions tab.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# Least privilege by default: jobs can read the repo and nothing else. The deploy
# job authenticates to Cloudflare with its own API token (a secret), not the
# GITHUB_TOKEN, so it needs no extra GitHub scopes.
permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # pnpm must be installed before setup-node so `cache: pnpm` can locate its
      # store. The version comes from the `packageManager` field in package.json.
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Surface known advisories in shipped (prod) dependencies without gating the
      # build — security signal, not a hard failure, so a new CVE can't block deploys.
      - name: Dependency audit (advisory, non-blocking)
        run: pnpm audit --prod || true
        continue-on-error: true
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Unit tests
        run: pnpm test
      - name: Integration tests (Workers pool + D1)
        run: pnpm test:integration
      - name: Build SPA
        run: pnpm build:web
      - name: Dry-run Worker bundle
        run: pnpm exec wrangler deploy --dry-run

  deploy:
    needs: build-test
    # Deploys via the Cloudflare API token only; no GitHub write scopes needed.
    permissions:
      contents: read
    # Activates once Cloudflare is set up: set the repo variable DEPLOY_ENABLED=true
    # (Settings → Secrets and variables → Actions → Variables) AND add the
    # CLOUDFLARE_API_TOKEN secret. Until then, pushes build + test green and the
    # deploy is skipped — no red X before infra exists.
    if: >-
      github.ref == 'refs/heads/master' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build SPA
        run: pnpm build:web

      # Apply any pending D1 migrations before the Worker that depends on them.
      # Each migration in ./migrations runs exactly once (tracked in d1_migrations);
      # the baseline is idempotent so it safely adopts the existing database.
      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          command: d1 migrations apply github-healthcheck-db --remote

      # Deploy the Worker and push its runtime secrets in one step. The Worker
      # secret GITHUB_CLIENT_SECRET is fed from the Actions secret
      # GH_OAUTH_CLIENT_SECRET (Actions forbids secret names starting GITHUB_).
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          command: deploy
          secrets: |
            SESSION_SECRET
            GITHUB_CLIENT_SECRET
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
